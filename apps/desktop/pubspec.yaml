name: biyi_app
description: A convenient translation and dictionary app written in Flutter.
homepage: https://github.com/biyidev/biyi
publish_to: "none"
version: 0.5.0+18

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  audioplayers: ^5.2.1
  bot_toast: ^4.1.3
  collection: ^1.18.0
  crypto: ^3.0.3
  dio: ^5.1.2
  fluentui_system_icons: ^1.1.255
  go_router: ^17.2.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hotkey_manager: ^0.2.3
  intl: ^0.20.2
  keypress_simulator: ^0.2.0
  launch_at_startup: ^0.3.1
  ocr_engine_builtin: ^0.1.1
  ocr_engine_youdao: ^0.1.1
  package_info_plus: ^9.0.0
  path: ^1.8.3
  path_provider: ^2.1.1
  photo_view: ^0.14.0
  protocol_handler: ^0.1.6
  reorderables: ^0.6.0
  screen_capturer: ^0.2.2
  screen_retriever: ^0.1.6
  screen_text_extractor: ^0.1.3
  shortid: ^0.1.2
  slang: ^4.13.0
  slang_flutter: ^4.13.0
  sticky_headers: ^0.3.0+2
  translation_engine_baidu: ^0.1.6
  translation_engine_caiyun: ^0.1.6
  translation_engine_deepl: ^0.1.6
  translation_engine_google: ^0.1.6
  translation_engine_iciba: ^0.1.6
  translation_engine_openai: ^0.1.6
  translation_engine_tencent: ^0.1.6
  translation_engine_youdao: ^0.1.6
  tray_manager: ^0.2.1
  uni_ocr_client: ^0.1.1
  uni_translate_client: ^0.1.7
  url_launcher: ^6.2.2
  vclibs: ^0.1.0
  nativeapi: ^0.1.0
  window_manager: ^0.3.4

dev_dependencies:
  build_runner: ^2.10.1
  dependency_validator: ^3.2.3
  go_router_builder: ^4.2.1
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  slang_build_runner: ^4.13.0

dependency_overrides:
  cnativeapi:
    path: ../../../../libnativeapi/nativeapi-flutter/packages/cnativeapi
  nativeapi:
    path: ../../../../libnativeapi/nativeapi-flutter/packages/nativeapi

flutter:
  uses-material-design: false

  assets:
    - resources/images/
    - resources/images/flag_icons/
    - resources/images/ocr_engine_icons/
    - resources/images/translation_engine_icons/

  fonts:
    - family: MiSans
      fonts:
        - asset: resources/fonts/MiSans-Regular.ttf
        - asset: resources/fonts/MiSans-Semibold.ttf
          weight: 600
        - asset: resources/fonts/MiSans-Bold.ttf
          weight: 700
    - family: Roboto Mono
      fonts:
        - asset: resources/fonts/RobotoMono-Regular.ttf
